<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 建筑能源智能管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #F5F7FA 0%, #E4E7EB 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-main-card {
            width: 920px;
            height: 520px;
            background: #FFFFFF;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
            display: flex;
            overflow: hidden;
        }

        .login-imge-area {
            width: 60%;
            height: 100%;
            background: #FAFAFA;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-imge-area img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .login-form-area {
            width: 40%;
            padding: 45px 35px;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-form-title {
            font-size: 26px;
            font-weight: 700;
            color: #212121;
            text-align: center;
            margin-bottom: 35px;
        }

        .input-container {
            position: relative;
            margin-bottom: 18px;
        }

        .input-container i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #9E9E9E;
            font-size: 18px;
        }

        .login-input {
            width: 100%;
            height: 52px;
            padding: 0 18px 0 52px;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            font-size: 15px;
            background: #FFFFFF;
            transition: all 0.3s ease;
        }

        .login-input::placeholder {
            color: #9E9E9E;
        }

        .login-input:focus {
            outline: none;
            border-color: #38A169;
            box-shadow: 0 0 0 4px rgba(56, 161, 105, 0.1);
        }

        .login-submit-btn {
            width: 100%;
            height: 52px;
            background: #38A169;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
        }

        .login-submit-btn:hover {
            background: #2F855A;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(56, 161, 105, 0.35);
        }
    </style>
</head>
<body>
    <div class="login-main-card">
        <div class="login-imge-area">
            <img src="imges/beijing.png" alt="登录背景">
        </div>
        <div class="login-form-area">
            <h1 class="login-form-title">账号</h1>
            <form id="loginForm">
                <div class="input-container">
                    <i class="fa fa-user"></i>
                    <input type="text" class="login-input" placeholder="账号" value="admin">
                </div>
                <div class="input-container">
                    <i class="fa fa-lock"></i>
                    <input type="password" class="login-input" placeholder="密码" value="123456">
                </div>
                <button type="submit" class="login-submit-btn">登 录</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'home.html';
        });
    </script>
</body>
</html>
