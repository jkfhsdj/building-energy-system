<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建筑能源智能管理与运营优化系统 - 趋势对比查询</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/v4-shims.min.css">
    <link rel="stylesheet" href="yangshi.css">
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="navbar-brand">
                <img src="imges/duibiao.png" alt="logo">
                <span>建筑能源智能管理系统</span>
            </div>
            <div class="navbar-menu">
                <a href="home.html">首页概览</a>
                <a href="query.html" class="active">数据查询</a>
                <a href="analysis.html">统计分析</a>
                <a href="device.html">设备管理</a>
                <a href="area.html">区域管理</a>
                <a href="chat.html">AI问答</a>
            </div>
        </nav>

        <div class="main-layout">
            <aside class="sidebar" @mouseenter="expandSidebar" @mouseleave="collapseSidebar" :class="{ 'expanded': isSidebarExpanded }">
                <div class="sidebar-header">
                    <div class="sidebar-logo">
                        <span class="sidebar-text">能源管理系统</span>
                    </div>
                </div>
                <nav class="sidebar-menu">
                    <a href="query.html" class="sidebar-item">
                        <i class="fa fa-search"></i>
                        <span class="sidebar-text">数据查询</span>
                    </a>
                    <a href="query-detail.html" class="sidebar-item">
                        <i class="fa fa-chart-line"></i>
                        <span class="sidebar-text">能耗明细查询</span>
                    </a>
                    <a href="query-trend.html" class="sidebar-item active">
                        <i class="fa fa-line-chart"></i>
                        <span class="sidebar-text">趋势对比查询</span>
                    </a>
                    <a href="query-history.html" class="sidebar-item">
                        <i class="fa fa-history"></i>
                        <span class="sidebar-text">历史数据查询</span>
                    </a>
                    <a href="query-export.html" class="sidebar-item">
                        <i class="fa fa-file-export"></i>
                        <span class="sidebar-text">数据导出记录</span>
                    </a>
                </nav>
            </aside>

            <div class="main-content" :class="{ 'sidebar-collapsed': !isSidebarExpanded }">
                <!-- 顶部搜索栏 -->
                <div class="search-bar">
                    <div class="search-row">
                        <div class="search-item">
                            <label>对比类型</label>
                            <el-select v-model="queryParams.compareType" size="small" placeholder="请选择对比类型">
                                <el-option label="多建筑对比" value="building"></el-option>
                                <el-option label="多时段对比" value="time"></el-option>
                            </el-select>
                        </div>
                        <div class="search-item">
                            <label>开始日期</label>
                            <el-date-picker
                                v-model="queryParams.startDate"
                                type="date"
                                size="small"
                                placeholder="选择开始日期"
                            ></el-date-picker>
                        </div>
                        <div class="search-item">
                            <label>结束日期</label>
                            <el-date-picker
                                v-model="queryParams.endDate"
                                type="date"
                                size="small"
                                placeholder="选择结束日期"
                            ></el-date-picker>
                        </div>
                        <div class="search-item">
                            <label>指标选择</label>
                            <el-select v-model="queryParams.metric" size="small" placeholder="请选择指标">
                                <el-option label="总能耗" value="total"></el-option>
                                <el-option label="电耗" value="electricity"></el-option>
                                <el-option label="水耗" value="water"></el-option>
                                <el-option label="气耗" value="gas"></el-option>
                            </el-select>
                        </div>
                        <div class="search-buttons">
                            <el-button type="primary" size="small" @click="handleQuery">
                                <i class="fa fa-search"></i>
                                查询
                            </el-button>
                            <el-button size="small" @click="handleReset">
                                <i class="fa fa-redo"></i>
                                重置
                            </el-button>
                        </div>
                    </div>
                </div>

                <!-- 数据展示区域 -->
                <div class="data-content">
                    <!-- 默认加载状态 -->
                    <div class="loading-state" v-if="!showChart">
                        <i class="fa fa-spinner fa-spin"></i>
                        <span>数据加载中...</span>
                    </div>

                    <div class="chart-box chart-box-full" v-show="showChart">
                        <div class="chart-title">
                            <i class="fa fa-chart-line"></i>
                            能耗趋势对比图
                        </div>
                        <div id="trendChart" style="width: 100%; height: 400px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script>
        const { createApp, ref, reactive, nextTick, onMounted } = Vue;
        
        createApp({
            setup() {
                const queryParams = reactive({
                    compareType: 'building',
                    startDate: new Date(new Date().getTime() - 30 * 24 * 60 * 60 * 1000),
                    endDate: new Date(),
                    metric: 'total'
                });
                
                const showChart = ref(false);
                const isSidebarExpanded = ref(false);
                
                const expandSidebar = () => {
                    isSidebarExpanded.value = true;
                };
                
                const collapseSidebar = () => {
                    isSidebarExpanded.value = false;
                };
                
                const handleQuery = () => {
                    showChart.value = true;
                    nextTick(() => {
                        initTrendChart();
                    });
                };
                
                const handleReset = () => {
                    queryParams.compareType = 'building';
                    queryParams.startDate = new Date(new Date().getTime() - 30 * 24 * 60 * 60 * 1000);
                    queryParams.endDate = new Date();
                    queryParams.metric = 'total';
                    showChart.value = false;
                };
                
                onMounted(() => {
                    showChart.value = true;
                    nextTick(() => {
                        initTrendChart();
                    });
                });
                
                return {
                    queryParams,
                    showChart,
                    isSidebarExpanded,
                    handleQuery,
                    handleReset,
                    expandSidebar,
                    collapseSidebar
                };
            }
        }).use(ElementPlus).mount('#app');

        function initTrendChart() {
            const chartDom = document.getElementById('trendChart');
            if (!chartDom) return;
            
            const chart = echarts.init(chartDom);
            const option = {
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(255, 255, 255, 0.95)',
                    borderColor: 'rgb(0, 170, 255)',
                    textStyle: { color: '#333' },
                    axisPointer: {
                        type: 'cross',
                        label: {
                            backgroundColor: 'rgb(0, 170, 255)'
                        }
                    }
                },
                legend: {
                    data: ['办公楼A', '实验楼B', '宿舍楼C', '食堂D'],
                    top: 0,
                    textStyle: { color: '#666' }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: ['3/1', '3/5', '3/10', '3/15', '3/20', '3/25', '3/30', '4/1'],
                    axisLine: { lineStyle: { color: '#ddd' } },
                    axisLabel: { color: '#666' }
                },
                yAxis: {
                    type: 'value',
                    name: 'kWh',
                    axisLine: { lineStyle: { color: '#ddd' } },
                    axisLabel: { color: '#666' },
                    splitLine: { lineStyle: { color: '#f0f0f0' } }
                },
                series: [
                    {
                        name: '办公楼A',
                        type: 'line',
                        smooth: true,
                        data: [2380, 2450, 2520, 2390, 2480, 2510, 2456, 2480],
                        lineStyle: { color: 'rgb(0, 170, 255)', width: 3 },
                        itemStyle: { color: 'rgb(0, 170, 255)' }
                    },
                    {
                        name: '实验楼B',
                        type: 'line',
                        smooth: true,
                        data: [1800, 1850, 1900, 1820, 1880, 1910, 1870, 1890],
                        lineStyle: { color: 'rgb(12, 78, 55)', width: 3 },
                        itemStyle: { color: 'rgb(12, 78, 55)' }
                    },
                    {
                        name: '宿舍楼C',
                        type: 'line',
                        smooth: true,
                        data: [1500, 1550, 1600, 1520, 1580, 1610, 1570, 1590],
                        lineStyle: { color: 'rgb(18, 100, 70)', width: 3 },
                        itemStyle: { color: 'rgb(18, 100, 70)' }
                    },
                    {
                        name: '食堂D',
                        type: 'line',
                        smooth: true,
                        data: [1200, 1250, 1300, 1220, 1280, 1310, 1270, 1290],
                        lineStyle: { color: 'rgb(0, 150, 225)', width: 3 },
                        itemStyle: { color: 'rgb(0, 150, 225)' }
                    }
                ]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
    </script>
</body>
</html>
