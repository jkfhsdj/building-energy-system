<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建筑能源智能管理与运营优化系统 - 节能建议咨询</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/v4-shims.min.css">
    <link rel="stylesheet" href="yangshi.css">
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="navbar-brand">
                <img src="imges/duibiao.png" alt="logo">
                <span>建筑能源智能管理系统</span>
            </div>
            <div class="navbar-menu">
                <a href="home.html">首页概览</a>
                <a href="query.html">数据查询</a>
                <a href="analysis.html">统计分析</a>
                <a href="device.html">设备管理</a>
                <a href="area.html">区域管理</a>
                <a href="chat.html" class="active">AI问答</a>
            </div>
        </nav>

        <div class="main-layout">
            <aside class="sidebar" @mouseenter="expandSidebar" @mouseleave="collapseSidebar" :class="{ 'expanded': isSidebarExpanded }">
                <div class="sidebar-header">
                    <div class="sidebar-logo">
                        <span class="sidebar-text">能源管理系统</span>
                    </div>
                </div>
                <nav class="sidebar-menu">
                    <a href="chat.html" class="sidebar-item">
                        <i class="fa fa-robot"></i>
                        <span class="sidebar-text">智能问答</span>
                    </a>
                    <a href="chat-faq.html" class="sidebar-item">
                        <i class="fa fa-question-circle"></i>
                        <span class="sidebar-text">常见问题库</span>
                    </a>
                    <a href="chat-suggest.html" class="sidebar-item active">
                        <i class="fa fa-lightbulb-o"></i>
                        <span class="sidebar-text">节能建议咨询</span>
                    </a>
                    <a href="chat-manual.html" class="sidebar-item">
                        <i class="fa fa-book"></i>
                        <span class="sidebar-text">系统操作手册</span>
                    </a>
                </nav>
            </aside>

            <div class="main-content" :class="{ 'sidebar-collapsed': !isSidebarExpanded }">
                <!-- 顶部搜索栏 -->
                <div class="search-bar">
                    <div class="search-row">
                        <div class="search-item">
                            <label>建筑类型</label>
                            <el-select v-model="suggestParams.buildingType" size="small" placeholder="请选择建筑类型">
                                <el-option label="办公楼" value="office"></el-option>
                                <el-option label="教学楼" value="teaching"></el-option>
                                <el-option label="宿舍楼" value="dormitory"></el-option>
                                <el-option label="商场" value="mall"></el-option>
                                <el-option label="医院" value="hospital"></el-option>
                            </el-select>
                        </div>
                        <div class="search-item">
                            <label>节能方向</label>
                            <el-select v-model="suggestParams.energyType" size="small" placeholder="请选择节能方向">
                                <el-option label="综合节能" value="all"></el-option>
                                <el-option label="空调节能" value="hvac"></el-option>
                                <el-option label="照明节能" value="lighting"></el-option>
                                <el-option label="电梯节能" value="elevator"></el-option>
                                <el-option label="水泵节能" value="pump"></el-option>
                            </el-select>
                        </div>
                        <div class="search-item">
                            <label>节能目标</label>
                            <el-select v-model="suggestParams.target" size="small" placeholder="请选择节能目标">
                                <el-option label="5-10%" value="10"></el-option>
                                <el-option label="10-20%" value="20"></el-option>
                                <el-option label="20-30%" value="30"></el-option>
                                <el-option label="30%以上" value="50"></el-option>
                            </el-select>
                        </div>
                        <div class="search-item">
                            <label>投资预算</label>
                            <el-select v-model="suggestParams.budget" size="small" placeholder="请选择投资预算">
                                <el-option label="10万以下" value="10"></el-option>
                                <el-option label="10-50万" value="50"></el-option>
                                <el-option label="50-100万" value="100"></el-option>
                                <el-option label="100万以上" value="200"></el-option>
                            </el-select>
                        </div>
                        <div class="search-buttons">
                            <el-button type="primary" size="small" @click="generateSuggest">
                                <i class="fa fa-magic"></i>
                                生成建议
                            </el-button>
                            <el-button size="small" @click="resetForm">
                                <i class="fa fa-redo"></i>
                                重置
                            </el-button>
                        </div>
                    </div>
                </div>

                <!-- 数据展示区域 -->
                <div class="data-content">
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">
                                <i class="fa fa-lightbulb-o"></i>
                                节能建议方案
                            </div>
                            <el-button type="success" class="btn btn-success" @click="exportSuggest">
                                <i class="fa fa-download"></i>
                                导出方案
                            </el-button>
                        </div>
                        
                        <div class="suggestions-overview">
                            <div class="stat-card highlight">
                                <i class="fa fa-percent"></i>
                                <div class="value">15-25%</div>
                                <div class="label">预计节能率</div>
                            </div>
                            <div class="stat-card">
                                <i class="fa fa-calculator"></i>
                                <div class="value">8-15万</div>
                                <div class="label">年度节能量(kWh)</div>
                            </div>
                            <div class="stat-card">
                                <i class="fa fa-money"></i>
                                <div class="value">6-12万</div>
                                <div class="label">年度节约费用(元)</div>
                            </div>
                            <div class="stat-card">
                                <i class="fa fa-calendar-check-o"></i>
                                <div class="value">2-3年</div>
                                <div class="label">投资回收期</div>
                            </div>
                        </div>

                        <div class="suggestion-categories">
                            <div class="category-card" v-for="(category, index) in suggestions" :key="index">
                                <div class="category-header">
                                    <i :class="category.icon"></i>
                                    <h3>{{ category.title }}</h3>
                                    <span class="category-badge" :class="category.priority">{{ category.priorityText }}</span>
                                </div>
                                <div class="category-content">
                                    <div class="suggestion-item" v-for="(item, idx) in category.items" :key="idx">
                                        <div class="suggestion-title">
                                            <i class="fa fa-check-circle"></i>
                                            <span>{{ item.title }}</span>
                                        </div>
                                        <div class="suggestion-desc">{{ item.desc }}</div>
                                        <div class="suggestion-meta">
                                            <span class="meta-item">
                                                <i class="fa fa-money"></i>
                                                投资：{{ item.invest }}
                                            </span>
                                            <span class="meta-item">
                                                <i class="fa fa-bolt"></i>
                                                节能：{{ item.energy }}
                                            </span>
                                            <span class="meta-item">
                                                <i class="fa fa-calendar"></i>
                                                周期：{{ item.period }}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
    <script>
        const { createApp, ref, reactive, onMounted } = Vue;
        
        createApp({
            setup() {
                const suggestParams = reactive({
                    buildingType: '',
                    energyType: 'all',
                    target: '20',
                    budget: '50'
                });
                
                const showSuggestions = ref(true);
                const isSidebarExpanded = ref(false);
                
                const suggestions = ref([]);
                
                const expandSidebar = () => {
                    isSidebarExpanded.value = true;
                };
                
                const collapseSidebar = () => {
                    isSidebarExpanded.value = false;
                };
                
                const generateSuggestData = () => {
                    suggestions.value = [
                        {
                            title: '空调系统节能',
                            icon: 'fa fa-snowflake-o',
                            priority: 'high',
                            priorityText: '高优先级',
                            items: [
                                {
                                    title: '空调温度优化',
                                    desc: '夏季制冷温度设置为26-28℃，冬季制热温度设置为18-20℃，每调高1℃可节能6-8%。',
                                    invest: '0.5万',
                                    energy: '8-12%',
                                    period: '1-2个月'
                                },
                                {
                                    title: '空调运行策略优化',
                                    desc: '提前30分钟开启空调，下班后及时关闭，避免设备频繁启停，可节能10-15%。',
                                    invest: '2-3万',
                                    energy: '10-15%',
                                    period: '3-6个月'
                                },
                                {
                                    title: '定期维护保养',
                                    desc: '定期清洗过滤网和换热器，检查制冷剂，确保设备高效运行，可节能5-10%。',
                                    invest: '1-2万',
                                    energy: '5-10%',
                                    period: '持续'
                                }
                            ]
                        },
                        {
                            title: '照明系统节能',
                            icon: 'fa fa-lightbulb-o',
                            priority: 'medium',
                            priorityText: '中优先级',
                            items: [
                                {
                                    title: 'LED灯具替换',
                                    desc: '将传统白炽灯、荧光灯替换为LED节能灯具，可节能50-70%，使用寿命延长3-5倍。',
                                    invest: '5-8万',
                                    energy: '15-20%',
                                    period: '1-2年'
                                },
                                {
                                    title: '智能照明控制',
                                    desc: '安装人体感应器和光照传感器，实现人来灯亮、人走灯灭，充分利用自然光，可节能20-30%。',
                                    invest: '3-5万',
                                    energy: '10-15%',
                                    period: '6-12个月'
                                }
                            ]
                        },
                        {
                            title: '电梯系统节能',
                            icon: 'fa fa-arrow-up',
                            priority: 'medium',
                            priorityText: '中优先级',
                            items: [
                                {
                                    title: '电梯调度优化',
                                    desc: '优化电梯运行群控算法，合理分配电梯任务，减少空载运行，可节能10-15%。',
                                    invest: '3-5万',
                                    energy: '8-12%',
                                    period: '6-12个月'
                                },
                                {
                                    title: '能量回馈装置',
                                    desc: '安装电梯能量回馈装置，将电梯下行时产生的势能转化为电能，可节能15-25%。',
                                    invest: '8-12万',
                                    energy: '12-18%',
                                    period: '1-2年'
                                }
                            ]
                        },
                        {
                            title: '管理措施节能',
                            icon: 'fa fa-cogs',
                            priority: 'low',
                            priorityText: '低优先级',
                            items: [
                                {
                                    title: '人员培训',
                                    desc: '加强员工节能意识培训，制定节能管理制度，设立节能奖励机制，可节能5-10%。',
                                    invest: '1-2万',
                                    energy: '5-8%',
                                    period: '持续'
                                },
                                {
                                    title: '能源管理系统',
                                    desc: '建设能源管理系统，实现实时监控、数据分析、优化决策，可节能10-15%。',
                                    invest: '10-15万',
                                    energy: '10-15%',
                                    period: '1-2年'
                                }
                            ]
                        }
                    ];
                    
                    showSuggestions.value = true;
                };
                
                const generateSuggest = () => {
                    showSuggestions.value = true;
                    generateSuggestData();
                    ElementPlus.ElMessage.success('节能建议生成成功！');
                };
                
                const resetForm = () => {
                    suggestParams.buildingType = 'office';
                    suggestParams.energyType = 'all';
                    suggestParams.target = '20';
                    suggestParams.budget = '50';
                    showSuggestions.value = true;
                    generateSuggestData();
                    ElementPlus.ElMessage.info('已重置为默认建议');
                };
                
                const exportSuggest = () => {
                    ElementPlus.ElMessage.success('节能建议方案导出成功！');
                };
                
                onMounted(() => {
                    suggestParams.buildingType = 'office';
                    generateSuggestData();
                });
                
                return {
                    suggestParams,
                    suggestions,
                    showSuggestions,
                    isSidebarExpanded,
                    generateSuggest,
                    resetForm,
                    exportSuggest,
                    expandSidebar,
                    collapseSidebar
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
    <style>
        .suggestions-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .suggestion-categories {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .category-card {
            border: 1px solid #e9ecef;
            border-radius: 8px;
            overflow: hidden;
        }
        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px 20px;
            background: linear-gradient(135deg, rgb(12, 78, 55) 0%, rgb(18, 100, 70) 100%);
            color: white;
        }
        .category-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            flex: 1;
        }
        .category-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .category-badge.high {
            background: #e74c3c;
        }
        .category-badge.medium {
            background: #f39c12;
        }
        .category-badge.low {
            background: #27ae60;
        }
        .category-content {
            padding: 20px;
        }
        .suggestion-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .suggestion-item:last-child {
            margin-bottom: 0;
        }
        .suggestion-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #0c4e37;
            margin-bottom: 8px;
        }
        .suggestion-title i {
            color: #27ae60;
        }
        .suggestion-desc {
            color: #666;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .suggestion-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #888;
        }
        .meta-item i {
            color: #0c4e37;
        }
    </style>
</body>
</html>
