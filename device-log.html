<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建筑能源智能管理与运营优化系统 - 设备日志操作</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/v4-shims.min.css">
    <link rel="stylesheet" href="yangshi.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #F5F7FA;
        }
        #app {
            visibility: hidden;
        }
        #app.loaded {
            visibility: visible;
        }
    </style>
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="navbar-brand">
                <img src="duibiao.png" alt="logo">
                <span>建筑能源智能管理系统</span>
            </div>
            <div class="navbar-menu">
                <a href="home.html">首页概览</a>
                <a href="query.html">数据查询</a>
                <a href="analysis.html">统计分析</a>
                <a href="device.html" class="active">设备管理</a>
                <a href="area.html">区域管理</a>
                <a href="chat.html">AI问答</a>
            </div>
        </nav>

        <div class="main-layout">
            <aside class="sidebar" @mouseenter="expandSidebar" @mouseleave="collapseSidebar" :class="{ 'expanded': isSidebarExpanded }">
                <div class="sidebar-header">
                    <div class="sidebar-logo">
                        <span class="sidebar-text">能源管理系统</span>
                    </div>
                </div>
                <nav class="sidebar-menu">
                    <a href="device.html" class="sidebar-item">
                        <i class="fa fa-list"></i>
                        <span class="sidebar-text">设备列表</span>
                    </a>
                    <a href="device-control.html" class="sidebar-item">
                        <i class="fa fa-sliders"></i>
                        <span class="sidebar-text">批量管控控制</span>
                    </a>
                    <a href="device-config.html" class="sidebar-item">
                        <i class="fa fa-cogs"></i>
                        <span class="sidebar-text">设备策略配置</span>
                    </a>
                    <a href="device-log.html" class="sidebar-item active">
                        <i class="fa fa-history"></i>
                        <span class="sidebar-text">设备日志操作</span>
                    </a>
                </nav>
            </aside>

            <div class="main-content" :class="{ 'sidebar-collapsed': !isSidebarExpanded }">
                <!-- 顶部搜索栏 -->
                <div class="search-bar">
                    <div class="search-row">
                        <div class="search-item">
                            <label>选择建筑</label>
                            <el-select v-model="logParams.building" size="small" placeholder="请选择建筑">
                                <el-option label="全部建筑" value="all"></el-option>
                                <el-option label="办公楼A" value="buildingA"></el-option>
                                <el-option label="实验楼B" value="buildingB"></el-option>
                                <el-option label="宿舍楼C" value="buildingC"></el-option>
                                <el-option label="食堂D" value="buildingD"></el-option>
                            </el-select>
                        </div>
                        <div class="search-item">
                            <label>设备类型</label>
                            <el-select v-model="logParams.deviceType" size="small" placeholder="请选择设备类型">
                                <el-option label="全部设备" value="all"></el-option>
                                <el-option label="空调系统" value="hvac"></el-option>
                                <el-option label="照明系统" value="lighting"></el-option>
                                <el-option label="电梯系统" value="elevator"></el-option>
                                <el-option label="水泵系统" value="pump"></el-option>
                            </el-select>
                        </div>
                        <div class="search-item">
                            <label>开始时间</label>
                            <el-date-picker
                                v-model="logParams.startTime"
                                type="datetime"
                                size="small"
                                placeholder="选择开始时间"
                            ></el-date-picker>
                        </div>
                        <div class="search-item">
                            <label>结束时间</label>
                            <el-date-picker
                                v-model="logParams.endTime"
                                type="datetime"
                                size="small"
                                placeholder="选择结束时间"
                            ></el-date-picker>
                        </div>
                        <div class="search-item">
                            <label>操作结果</label>
                            <el-select v-model="logParams.result" size="small" placeholder="请选择结果">
                                <el-option label="全部结果" value="all"></el-option>
                                <el-option label="成功" value="success"></el-option>
                                <el-option label="失败" value="fail"></el-option>
                            </el-select>
                        </div>
                        <div class="search-buttons">
                            <el-button type="primary" size="small" @click="handleSearch">
                                <i class="fa fa-search"></i>
                                查询
                            </el-button>
                            <el-button size="small" @click="handleReset">
                                <i class="fa fa-redo"></i>
                                重置
                            </el-button>
                            <el-button type="success" size="small" @click="handleExport">
                                <i class="fa fa-download"></i>
                                导出日志
                            </el-button>
                        </div>
                    </div>
                </div>

                <!-- 数据展示区域 -->
                <div class="data-content">
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">
                                <i class="fa fa-list"></i>
                                操作日志
                            </div>
                        </div>
                        <el-table :data="logData" class="data-table" stripe>
                            <el-table-column prop="time" label="时间" width="180"></el-table-column>
                            <el-table-column prop="device" label="设备名称" width="200"></el-table-column>
                            <el-table-column prop="type" label="设备类型" width="120"></el-table-column>
                            <el-table-column prop="building" label="所属建筑" width="120"></el-table-column>
                            <el-table-column prop="operator" label="操作人" width="120"></el-table-column>
                            <el-table-column prop="action" label="操作类型" width="150"></el-table-column>
                            <el-table-column prop="result" label="操作结果">
                                <template #default="scope">
                                    <span class="badge" :class="scope.row.result === '成功' ? 'success' : 'danger'">
                                        {{ scope.row.result }}
                                    </span>
                                </template>
                            </el-table-column>
                            <el-table-column prop="detail" label="详细信息" min-width="200"></el-table-column>
                        </el-table>
                        <div class="pagination-wrapper">
                            <el-pagination
                                background
                                layout="prev, pager, next"
                                :total="200"
                                @current-change="handlePageChange"
                            ></el-pagination>
                        </div>
                    </div>
                </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script>
        const { createApp, ref, reactive, onMounted } = Vue;
        
        createApp({
            setup() {
                const logParams = reactive({
                    building: 'all',
                    deviceType: 'all',
                    startTime: new Date(new Date().getTime() - 24 * 60 * 60 * 1000),
                    endTime: new Date(),
                    result: 'all'
                });
                
                const logData = ref([]);
                const isSidebarExpanded = ref(false);
                
                const expandSidebar = () => {
                    isSidebarExpanded.value = true;
                };
                
                const collapseSidebar = () => {
                    isSidebarExpanded.value = false;
                };
                
                const handleSearch = () => {
                    ElementPlus.ElMessage.success('查询成功！');
                    generateLogData();
                };
                
                const handleReset = () => {
                    logParams.building = 'all';
                    logParams.deviceType = 'all';
                    logParams.startTime = new Date(new Date().getTime() - 24 * 60 * 60 * 1000);
                    logParams.endTime = new Date();
                    logParams.result = 'all';
                    generateLogData();
                    ElementPlus.ElMessage.info('已重置筛选条件');
                };
                
                const handleExport = () => {
                    ElementPlus.ElMessage.success('日志导出成功！');
                };
                
                const handlePageChange = (page) => {
                    console.log('当前页:', page);
                };
                
                const generateLogData = () => {
                    const buildings = ['办公楼A', '实验楼B', '宿舍楼C', '食堂D'];
                    const deviceTypes = ['空调系统', '照明系统', '电梯系统', '水泵系统'];
                    const actions = ['开机', '关机', '待机', '参数调整', '状态检查'];
                    const operators = ['张三', '李四', '王五', '赵六'];
                    const results = ['成功', '失败'];
                    const data = [];
                    
                    for (let i = 0; i < 10; i++) {
                        const date = new Date();
                        date.setMinutes(date.getMinutes() - i * 30);
                        data.push({
                            time: date.toLocaleString(),
                            device: `${deviceTypes[Math.floor(Math.random() * deviceTypes.length)]}-${String(Math.floor(Math.random() * 100) + 1).padStart(2, '0')}`,
                            type: deviceTypes[Math.floor(Math.random() * deviceTypes.length)],
                            building: buildings[Math.floor(Math.random() * buildings.length)],
                            operator: operators[Math.floor(Math.random() * operators.length)],
                            action: actions[Math.floor(Math.random() * actions.length)],
                            result: Math.random() > 0.1 ? '成功' : '失败',
                            detail: '设备操作执行完成'
                        });
                    }
                    logData.value = data;
                };
                
                onMounted(() => {
                    generateLogData();
                    document.getElementById('app').classList.add('loaded');
                });
                
                return {
                    logParams,
                    logData,
                    isSidebarExpanded,
                    handleSearch,
                    handleReset,
                    handleExport,
                    handlePageChange,
                    expandSidebar,
                    collapseSidebar
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
