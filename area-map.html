<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建筑能源智能管理与运营优化系统 - 楼宇拓扑图</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/v4-shims.min.css">
    <link rel="stylesheet" href="yangshi.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #F5F7FA;
        }
        #app {
            visibility: hidden;
        }
        #app.loaded {
            visibility: visible;
        }
        .topology-container {
            width: 100%;
            height: 500px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 8px;
        }
        .topology-svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        .topology-svg:active {
            cursor: grabbing;
        }
        .node-circle {
            stroke-width: 2;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .node-circle:hover {
            stroke-width: 4;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        .node-normal {
            fill: #38A169;
            stroke: #276749;
        }
        .node-warning {
            fill: #ED8936;
            stroke: #C05621;
        }
        .node-error {
            fill: #E53E3E;
            stroke: #C53030;
        }
        .node-label {
            font-size: 12px;
            fill: #333;
            text-anchor: middle;
            pointer-events: none;
            font-weight: 500;
        }
        .connection-line {
            stroke: #CBD5E0;
            stroke-width: 2;
        }
        .map-controls-inline {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="navbar-brand">
                <img src="imges/duibiao.png" alt="logo">
                <span>建筑能源智能管理系统</span>
            </div>
            <div class="navbar-menu">
                <a href="home.html">首页概览</a>
                <a href="query.html">数据查询</a>
                <a href="analysis.html">统计分析</a>
                <a href="device.html">设备管理</a>
                <a href="area.html" class="active">楼宇管理</a>
                <a href="chat.html">AI问答</a>
            </div>
        </nav>

        <div class="main-layout">
            <aside class="sidebar" @mouseenter="expandSidebar" @mouseleave="collapseSidebar" :class="{ 'expanded': isSidebarExpanded }">
                <div class="sidebar-header">
                    <div class="sidebar-logo">
                        <span class="sidebar-text">建筑能源智能管理系统</span>
                    </div>
                </div>
                <nav class="sidebar-menu">
                    <a href="area.html" class="sidebar-item">
                        <i class="fa fa-building"></i>
                        <span class="sidebar-text">楼宇列表</span>
                    </a>
                    <a href="area-map.html" class="sidebar-item active">
                        <i class="fa fa-project-diagram"></i>
                        <span class="sidebar-text">楼宇拓扑图</span>
                    </a>
                    <a href="area-stat.html" class="sidebar-item">
                        <i class="fa fa-chart-bar"></i>
                        <span class="sidebar-text">楼宇能耗统计</span>
                    </a>
                    <a href="area-log.html" class="sidebar-item">
                        <i class="fa fa-history"></i>
                        <span class="sidebar-text">楼宇操作日志</span>
                    </a>
                </nav>
            </aside>

            <div class="main-content" :class="{ 'sidebar-collapsed': !isSidebarExpanded }">
                <!-- 顶部搜索栏 -->
                <div class="search-bar">
                    <div class="search-row">
                        <div class="search-item">
                            <label>选择楼宇</label>
                            <el-select v-model="mapParams.region" size="small" placeholder="请选择楼宇">
                                <el-option label="全部楼宇" value="all"></el-option>
                                <el-option label="公司总部" value="hq"></el-option>
                                <el-option label="办公楼A" value="officeA"></el-option>
                                <el-option label="办公楼B" value="officeB"></el-option>
                                <el-option label="研发楼" value="rd"></el-option>
                                <el-option label="生产厂房" value="factory"></el-option>
                            </el-select>
                        </div>
                        <div class="search-item">
                            <label>显示类型</label>
                            <el-select v-model="mapParams.showType" size="small" placeholder="请选择显示类型">
                                <el-option label="全部显示" value="all"></el-option>
                                <el-option label="仅显示建筑" value="building"></el-option>
                                <el-option label="仅显示设备" value="device"></el-option>
                            </el-select>
                        </div>
                        <div class="search-item">
                            <label>节点状态</label>
                            <el-select v-model="mapParams.status" size="small" placeholder="请选择状态">
                                <el-option label="全部状态" value="all"></el-option>
                                <el-option label="正常" value="normal"></el-option>
                                <el-option label="警告" value="warning"></el-option>
                                <el-option label="异常" value="error"></el-option>
                            </el-select>
                        </div>
                        <div class="search-buttons">
                            <el-button size="small" @click="zoomIn">
                                <i class="fa fa-search-plus"></i>
                                放大
                            </el-button>
                            <el-button size="small" @click="zoomOut">
                                <i class="fa fa-search-minus"></i>
                                缩小
                            </el-button>
                            <el-button size="small" @click="resetZoom">
                                <i class="fa fa-home"></i>
                                重置
                            </el-button>
                            <el-button type="primary" size="small" @click="handleSearch">
                                <i class="fa fa-search"></i>
                                查询
                            </el-button>
                            <el-button size="small" @click="handleReset">
                                <i class="fa fa-redo"></i>
                                重置
                            </el-button>
                        </div>
                    </div>
                </div>

                <!-- 数据展示区域 -->
                <div class="data-content">
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">
                                <i class="fa fa-project-diagram"></i>
                                公司楼宇拓扑图
                            </div>
                            <div style="display: flex; gap: 20px; margin-left: 30px;">
                                <div style="display: flex; align-items: center; gap: 6px;">
                                    <span style="width: 12px; height: 12px; border-radius: 50%; background: #38A169;"></span>
                                    <span style="font-size: 13px; color: #666;">正常</span>
                                </div>
                                <div style="display: flex; align-items: center; gap: 6px;">
                                    <span style="width: 12px; height: 12px; border-radius: 50%; background: #ED8936;"></span>
                                    <span style="font-size: 13px; color: #666;">警告</span>
                                </div>
                                <div style="display: flex; align-items: center; gap: 6px;">
                                    <span style="width: 12px; height: 12px; border-radius: 50%; background: #E53E3E;"></span>
                                    <span style="font-size: 13px; color: #666;">异常</span>
                                </div>
                            </div>
                        </div>
                        <div class="topology-container" id="topologyContainer">
                            <svg class="topology-svg" id="topologySvg" viewBox="0 0 800 500">
                                <g id="topologyGroup"></g>
                            </svg>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">
                                <i class="fa fa-list"></i>
                                楼宇节点列表
                            </div>
                        </div>
                        <el-table :data="nodeData" class="data-table" stripe>
                            <el-table-column prop="id" label="节点ID" width="120"></el-table-column>
                            <el-table-column prop="name" label="楼宇名称" width="200"></el-table-column>
                            <el-table-column prop="type" label="楼宇类型" width="120"></el-table-column>
                            <el-table-column prop="parent" label="所属区域" width="150"></el-table-column>
                            <el-table-column prop="deviceCount" label="设备数量" width="100"></el-table-column>
                            <el-table-column prop="energy" label="能耗 (kWh)" width="120"></el-table-column>
                            <el-table-column prop="status" label="状态" width="100">
                                <template #default="scope">
                                    <span class="badge" :class="scope.row.status === '正常' ? 'success' : scope.row.status === '警告' ? 'warning' : 'danger'">
                                        {{ scope.row.status }}
                                    </span>
                                </template>
                            </el-table-column>
                        </el-table>
                        <div class="pagination-wrapper">
                            <el-pagination
                                background
                                layout="prev, pager, next"
                                :total="50"
                                @current-change="handlePageChange"
                            ></el-pagination>
                        </div>
                    </div>
                </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script>
        const { createApp, ref, reactive, onMounted } = Vue;
        
        createApp({
            setup() {
                const mapParams = reactive({
                    region: 'all',
                    showType: 'all',
                    status: 'all'
                });
                
                const nodeData = ref([]);
                const isSidebarExpanded = ref(false);
                const scale = ref(1);
                const translate = ref({ x: 0, y: 0 });
                
                const expandSidebar = () => {
                    isSidebarExpanded.value = true;
                };
                
                const collapseSidebar = () => {
                    isSidebarExpanded.value = false;
                };
                
                const updateTransform = () => {
                    const group = document.getElementById('topologyGroup');
                    if (group) {
                        group.setAttribute('transform', `translate(${translate.value.x}, ${translate.value.y}) scale(${scale.value})`);
                    }
                };
                
                const zoomIn = () => {
                    scale.value = Math.min(scale.value + 0.2, 3);
                    updateTransform();
                    ElementPlus.ElMessage.info(`已放大: ${Math.round(scale.value * 100)}%`);
                };
                
                const zoomOut = () => {
                    scale.value = Math.max(scale.value - 0.2, 0.3);
                    updateTransform();
                    ElementPlus.ElMessage.info(`已缩小: ${Math.round(scale.value * 100)}%`);
                };
                
                const resetZoom = () => {
                    scale.value = 1;
                    translate.value = { x: 0, y: 0 };
                    updateTransform();
                    ElementPlus.ElMessage.info('已重置视图');
                };
                
                const generateTopology = () => {
                    const group = document.getElementById('topologyGroup');
                    if (!group) return;
                    
                    group.innerHTML = '';
                    
                    const nodes = [
                        { id: 1, name: '公司总部', x: 400, y: 60, status: 'normal', size: 42, type: '中心' },
                        { id: 2, name: '办公楼A', x: 180, y: 180, status: 'normal', size: 35, type: '楼宇' },
                        { id: 3, name: '办公楼B', x: 620, y: 180, status: 'normal', size: 35, type: '楼宇' },
                        { id: 4, name: '研发楼', x: 400, y: 200, status: 'warning', size: 35, type: '楼宇' },
                        { id: 5, name: '生产厂房', x: 150, y: 340, status: 'normal', size: 35, type: '楼宇' },
                        { id: 6, name: '宿舍楼', x: 650, y: 340, status: 'error', size: 35, type: '楼宇' },
                        { id: 7, name: '食堂活动中心', x: 400, y: 360, status: 'normal', size: 30, type: '楼宇' },
                        { id: 8, name: '行政部', x: 130, y: 130, status: 'normal', size: 22, type: '部门' },
                        { id: 9, name: '财务部', x: 230, y: 130, status: 'normal', size: 22, type: '部门' },
                        { id: 10, name: '研发一部', x: 340, y: 130, status: 'normal', size: 22, type: '部门' },
                        { id: 11, name: '研发二部', x: 460, y: 130, status: 'warning', size: 22, type: '部门' },
                        { id: 12, name: '生产车间', x: 100, y: 420, status: 'normal', size: 22, type: '部门' },
                        { id: 13, name: '仓储部', x: 200, y: 420, status: 'normal', size: 22, type: '部门' }
                    ];
                    
                    const connections = [
                        { from: 1, to: 2 }, { from: 1, to: 3 }, { from: 1, to: 4 }, { from: 1, to: 5 },
                        { from: 2, to: 6 }, { from: 2, to: 7 },
                        { from: 3, to: 8 }, { from: 3, to: 9 },
                        { from: 4, to: 10 }, { from: 4, to: 11 },
                        { from: 5, to: 12 }, { from: 5, to: 13 }
                    ];
                    
                    connections.forEach(conn => {
                        const fromNode = nodes.find(n => n.id === conn.from);
                        const toNode = nodes.find(n => n.id === conn.to);
                        if (fromNode && toNode) {
                            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('x1', fromNode.x);
                            line.setAttribute('y1', fromNode.y);
                            line.setAttribute('x2', toNode.x);
                            line.setAttribute('y2', toNode.y);
                            line.setAttribute('class', 'connection-line');
                            group.appendChild(line);
                        }
                    });
                    
                    nodes.forEach(node => {
                        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        circle.setAttribute('cx', node.x);
                        circle.setAttribute('cy', node.y);
                        circle.setAttribute('r', node.size);
                        circle.setAttribute('class', `node-circle node-${node.status}`);
                        circle.setAttribute('data-name', node.name);
                        circle.addEventListener('click', () => {
                            ElementPlus.ElMessage.success(`点击节点: ${node.name} (${node.type}) - 状态: ${node.status === 'normal' ? '正常' : node.status === 'warning' ? '警告' : '异常'}`);
                        });
                        group.appendChild(circle);
                        
                        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        text.setAttribute('x', node.x);
                        text.setAttribute('y', node.y + node.size + 18);
                        text.setAttribute('class', 'node-label');
                        text.textContent = node.name;
                        group.appendChild(text);
                    });
                };
                
                const handleSearch = () => {
                    generateNodeData();
                    generateTopology();
                    ElementPlus.ElMessage.success('拓扑图刷新成功！');
                };
                
                const handleReset = () => {
                    mapParams.region = 'all';
                    mapParams.showType = 'all';
                    mapParams.status = 'all';
                    scale.value = 1;
                    translate.value = { x: 0, y: 0 };
                    generateNodeData();
                    generateTopology();
                    updateTransform();
                    ElementPlus.ElMessage.info('已重置筛选条件');
                };
                
                const handlePageChange = (page) => {
                    console.log('当前页:', page);
                };
                
                const generateNodeData = () => {
                    const types = ['办公楼', '研发楼', '厂房', '宿舍', '楼层', '设备'];
                    const parents = ['公司总部', '办公楼A', '办公楼B', '研发楼', '生产厂房'];
                    const statuses = ['正常', '警告', '异常'];
                    const data = [];
                    
                    for (let i = 0; i < 10; i++) {
                        data.push({
                            id: `NODE${String(i + 1).padStart(3, '0')}`,
                            name: `节点-${String(i + 1).padStart(2, '0')}`,
                            type: types[Math.floor(Math.random() * types.length)],
                            parent: parents[Math.floor(Math.random() * parents.length)],
                            deviceCount: Math.floor(Math.random() * 100) + 10,
                            energy: (Math.random() * 1000 + 100).toFixed(2),
                            status: statuses[Math.floor(Math.random() * statuses.length)]
                        });
                    }
                    nodeData.value = data;
                };
                
                onMounted(() => {
                    generateNodeData();
                    generateTopology();
                    document.getElementById('app').classList.add('loaded');
                });
                
                return {
                    mapParams,
                    nodeData,
                    isSidebarExpanded,
                    zoomIn,
                    zoomOut,
                    resetZoom,
                    handleSearch,
                    handleReset,
                    handlePageChange,
                    expandSidebar,
                    collapseSidebar
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
    <style>
        .topology-map {
            min-height: 400px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .map-placeholder {
            text-align: center;
            color: #999;
        }
        .map-placeholder i {
            font-size: 64px;
            margin-bottom: 20px;
            color: #0c4e37;
        }
        .map-placeholder > div:first-of-type {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .map-legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .legend-dot.normal {
            background: #27ae60;
        }
        .legend-dot.warning {
            background: #f39c12;
        }
        .legend-dot.error {
            background: #e74c3c;
        }
    </style>
</body>
</html>
