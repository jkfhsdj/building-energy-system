<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建筑能源智能管理与运营优化系统 - 能耗明细查询</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/v4-shims.min.css">
    <link rel="stylesheet" href="yangshi.css">
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="navbar-brand">
                <img src="imges/duibiao.png" alt="logo">
                <span>建筑能源智能管理系统</span>
            </div>
            <div class="navbar-menu">
                <a href="home.html">首页概览</a>
                <a href="query.html" class="active">数据查询</a>
                <a href="analysis.html">统计分析</a>
                <a href="device.html">设备管理</a>
                <a href="area.html">区域管理</a>
                <a href="chat.html">AI问答</a>
            </div>
        </nav>

        <div class="main-layout">
            <aside class="sidebar" @mouseenter="expandSidebar" @mouseleave="collapseSidebar" :class="{ 'expanded': isSidebarExpanded }">
                <div class="sidebar-header">
                    <div class="sidebar-logo">
                        <span class="sidebar-text">能源管理系统</span>
                    </div>
                </div>
                <nav class="sidebar-menu">
                    <a href="query.html" class="sidebar-item">
                        <i class="fa fa-search"></i>
                        <span class="sidebar-text">数据查询</span>
                    </a>
                    <a href="query-detail.html" class="sidebar-item active">
                        <i class="fa fa-chart-line"></i>
                        <span class="sidebar-text">能耗明细查询</span>
                    </a>
                    <a href="query-trend.html" class="sidebar-item">
                        <i class="fa fa-line-chart"></i>
                        <span class="sidebar-text">趋势对比查询</span>
                    </a>
                    <a href="query-history.html" class="sidebar-item">
                        <i class="fa fa-history"></i>
                        <span class="sidebar-text">历史数据查询</span>
                    </a>
                    <a href="query-export.html" class="sidebar-item">
                        <i class="fa fa-file-export"></i>
                        <span class="sidebar-text">数据导出记录</span>
                    </a>
                </nav>
            </aside>

            <div class="main-content" :class="{ 'sidebar-collapsed': !isSidebarExpanded }">
                <!-- 顶部搜索栏 -->
                <div class="search-bar">
                    <div class="search-row">
                        <div class="search-item">
                            <label>选择建筑</label>
                            <el-select v-model="queryParams.building" size="small" placeholder="请选择建筑">
                                <el-option label="全部建筑" value="all"></el-option>
                                <el-option label="办公楼A" value="buildingA"></el-option>
                                <el-option label="实验楼B" value="buildingB"></el-option>
                                <el-option label="宿舍楼C" value="buildingC"></el-option>
                                <el-option label="食堂D" value="buildingD"></el-option>
                            </el-select>
                        </div>
                        <div class="search-item">
                            <label>开始日期</label>
                            <el-date-picker
                                v-model="queryParams.startDate"
                                type="date"
                                size="small"
                                placeholder="选择开始日期"
                            ></el-date-picker>
                        </div>
                        <div class="search-item">
                            <label>结束日期</label>
                            <el-date-picker
                                v-model="queryParams.endDate"
                                type="date"
                                size="small"
                                placeholder="选择结束日期"
                            ></el-date-picker>
                        </div>
                        <div class="search-item">
                            <label>设备类型</label>
                            <el-select v-model="queryParams.deviceType" size="small" placeholder="请选择设备类型">
                                <el-option label="全部设备" value="all"></el-option>
                                <el-option label="空调系统" value="hvac"></el-option>
                                <el-option label="照明系统" value="lighting"></el-option>
                                <el-option label="电梯系统" value="elevator"></el-option>
                                <el-option label="水泵系统" value="pump"></el-option>
                            </el-select>
                        </div>
                        <div class="search-buttons">
                            <el-button type="primary" size="small" @click="handleQuery">
                                <i class="fa fa-search"></i>
                                查询
                            </el-button>
                            <el-button size="small" @click="handleReset">
                                <i class="fa fa-redo"></i>
                                重置
                            </el-button>
                        </div>
                    </div>
                </div>

                <!-- 数据展示区域 -->
                <div class="data-content">
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">
                                <i class="fa fa-table"></i>
                                能耗明细
                            </div>
                        </div>
                        <el-table :data="tableData" class="data-table" stripe>
                            <el-table-column prop="date" label="日期" width="120"></el-table-column>
                            <el-table-column prop="building" label="建筑名称" width="150"></el-table-column>
                            <el-table-column prop="device" label="设备名称" width="180"></el-table-column>
                            <el-table-column prop="type" label="设备类型" width="120"></el-table-column>
                            <el-table-column prop="energy" label="能耗值 (kWh)" width="150"></el-table-column>
                            <el-table-column prop="trend" label="趋势">
                                <template #default="scope">
                                    <span v-if="scope.row.trend === 'up'" style="color: #e74c3c;">
                                        <i class="fa fa-arrow-up"></i> 上升
                                    </span>
                                    <span v-else style="color: #27ae60;">
                                        <i class="fa fa-arrow-down"></i> 下降
                                    </span>
                                </template>
                            </el-table-column>
                            <el-table-column prop="status" label="状态">
                                <template #default="scope">
                                    <span class="badge" :class="scope.row.status === '正常' ? 'success' : 'warning'">
                                        {{ scope.row.status }}
                                    </span>
                                </template>
                            </el-table-column>
                        </el-table>
                        <div class="pagination-wrapper">
                            <el-pagination
                                background
                                layout="prev, pager, next"
                                :total="100"
                                @current-change="handlePageChange"
                            ></el-pagination>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script>
        const { createApp, ref, reactive, nextTick, onMounted } = Vue;
        
        createApp({
            setup() {
                const queryParams = reactive({
                    building: 'all',
                    startDate: new Date(new Date().getTime() - 7 * 24 * 60 * 60 * 1000),
                    endDate: new Date(),
                    deviceType: 'all'
                });
                
                const showTable = ref(true);
                const tableData = ref([]);
                const isSidebarExpanded = ref(false);
                
                const expandSidebar = () => {
                    isSidebarExpanded.value = true;
                };
                
                const collapseSidebar = () => {
                    isSidebarExpanded.value = false;
                };
                
                const handleQuery = () => {
                    showTable.value = true;
                    nextTick(() => {
                        generateTableData();
                    });
                };
                
                const handleReset = () => {
                    queryParams.building = 'all';
                    queryParams.startDate = new Date(new Date().getTime() - 7 * 24 * 60 * 60 * 1000);
                    queryParams.endDate = new Date();
                    queryParams.deviceType = 'all';
                    showTable.value = true;
                    nextTick(() => {
                        generateTableData();
                    });
                };
                
                const handlePageChange = (page) => {
                    console.log('当前页:', page);
                };
                
                const generateTableData = () => {
                    const buildings = ['办公楼A', '实验楼B', '宿舍楼C', '食堂D'];
                    const devices = ['中央空调主机-01', '照明系统-东区', '电梯系统-02', '水泵系统-01', '通风系统-03'];
                    const types = ['空调', '照明', '电梯', '水泵', '通风'];
                    const data = [];
                    
                    for (let i = 0; i < 10; i++) {
                        const date = new Date();
                        date.setDate(date.getDate() - i);
                        data.push({
                            date: date.toLocaleDateString(),
                            building: buildings[Math.floor(Math.random() * buildings.length)],
                            device: devices[Math.floor(Math.random() * devices.length)],
                            type: types[Math.floor(Math.random() * types.length)],
                            energy: (Math.random() * 1000).toFixed(2),
                            trend: Math.random() > 0.5 ? 'up' : 'down',
                            status: Math.random() > 0.2 ? '正常' : '异常'
                        });
                    }
                    tableData.value = data.reverse();
                };
                
                onMounted(() => {
                    nextTick(() => {
                        generateTableData();
                    });
                });
                
                return {
                    queryParams,
                    showTable,
                    tableData,
                    isSidebarExpanded,
                    handleQuery,
                    handleReset,
                    handlePageChange,
                    expandSidebar,
                    collapseSidebar
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
