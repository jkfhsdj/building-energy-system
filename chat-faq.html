<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建筑能源智能管理与运营优化系统 - 常见问题库</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/v4-shims.min.css">
    <link rel="stylesheet" href="yangshi.css">
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="navbar-brand">
                <img src="imges/duibiao.png" alt="logo">
                <span>建筑能源智能管理系统</span>
            </div>
            <div class="navbar-menu">
                <a href="home.html">首页概览</a>
                <a href="query.html">数据查询</a>
                <a href="analysis.html">统计分析</a>
                <a href="device.html">设备管理</a>
                <a href="area.html">区域管理</a>
                <a href="chat.html" class="active">AI问答</a>
            </div>
        </nav>

        <div class="main-layout">
            <aside class="sidebar" @mouseenter="expandSidebar" @mouseleave="collapseSidebar" :class="{ 'expanded': isSidebarExpanded }">
                <div class="sidebar-header">
                    <div class="sidebar-logo">
                        <span class="sidebar-text">能源管理系统</span>
                    </div>
                </div>
                <nav class="sidebar-menu">
                    <a href="chat.html" class="sidebar-item">
                        <i class="fa fa-robot"></i>
                        <span class="sidebar-text">智能问答</span>
                    </a>
                    <a href="chat-faq.html" class="sidebar-item active">
                        <i class="fa fa-question-circle"></i>
                        <span class="sidebar-text">常见问题库</span>
                    </a>
                    <a href="chat-suggest.html" class="sidebar-item">
                        <i class="fa fa-lightbulb-o"></i>
                        <span class="sidebar-text">节能建议咨询</span>
                    </a>
                    <a href="chat-manual.html" class="sidebar-item">
                        <i class="fa fa-book"></i>
                        <span class="sidebar-text">系统操作手册</span>
                    </a>
                </nav>
            </aside>

            <div class="main-content" :class="{ 'sidebar-collapsed': !isSidebarExpanded }">
                <div class="container">
                    <h1 class="page-title">
                        <i class="fa fa-question-circle"></i>
                        常见问题库
                    </h1>

                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">
                                <i class="fa fa-search"></i>
                                搜索问题
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group" style="flex: 1;">
                                <el-input
                                    v-model="searchKeyword"
                                    class="form-input"
                                    placeholder="请输入关键词搜索问题"
                                    clearable
                                    @input="handleSearch"
                                >
                                    <template #append>
                                        <el-button @click="handleSearch">
                                            <i class="fa fa-search"></i>
                                        </el-button>
                                    </template>
                                </el-input>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">
                                <i class="fa fa-list"></i>
                                常见问题列表
                            </div>
                        </div>
                        <div class="faq-list">
                            <el-collapse v-model="activeFaq" accordion>
                                <el-collapse-item
                                    v-for="(faq, index) in filteredFaqs"
                                    :key="index"
                                    :name="index"
                                >
                                    <template #title>
                                        <div class="faq-title">
                                            <i class="fa fa-question-circle"></i>
                                            <span>{{ faq.question }}</span>
                                        </div>
                                    </template>
                                    <div class="faq-content">
                                        {{ faq.answer }}
                                    </div>
                                </el-collapse-item>
                            </el-collapse>
                            <div v-if="filteredFaqs.length === 0" class="empty-state">
                                <i class="fa fa-search"></i>
                                <div>暂无相关问题</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
    <script>
        const { createApp, ref, computed } = Vue;
        
        createApp({
            setup() {
                const searchKeyword = ref('');
                const activeFaq = ref(0);
                const isSidebarExpanded = ref(false);
                
                const faqs = ref([
                    {
                        question: '如何降低建筑能耗？',
                        answer: '建筑能耗降低可以从以下几个方面入手：1.设备优化：定期维护空调、照明、电梯等设备，确保高效运行；更换老旧设备，选用节能型产品；优化设备运行参数，如空调温度设置在26℃左右。2.智能控制：安装智能照明系统，实现人来灯亮、人走灯灭；使用空调智能控制系统，根据人流量自动调节；建立设备联动机制，避免能源浪费。3.行为节能：加强员工节能意识培训；制定节能管理制度；设立节能奖励机制。'
                    },
                    {
                        question: '什么是COP能效比？',
                        answer: 'COP（Coefficient of Performance）即性能系数，是衡量制冷设备能效的重要指标。计算公式：COP = 制冷量(kW) / 耗电量(kW)。意义说明：COP值越高，表示能源利用效率越高；一般COP值在3.0-5.0之间为正常范围；COP值每提高0.1，可节能约3%。影响因素：设备类型和品牌、运行工况、维护保养状况、使用年限。'
                    },
                    {
                        question: '空调系统如何节能？',
                        answer: '空调系统节能可以采取以下措施：1.温度设置优化：夏季制冷：26-28℃；冬季制热：18-20℃；每调高1℃，可节能6-8%。2.运行策略优化：提前30分钟开启空调；下班后及时关闭；避免频繁启停。3.设备维护：定期清洗过滤网（每2周一次）；定期清洗换热器（每季度一次）；检查制冷剂是否充足。4.系统优化：采用变频技术；安装智能控制系统；优化风道设计，减少阻力。'
                    },
                    {
                        question: '如何进行异常检测？',
                        answer: '能源系统异常检测的方法和步骤：检测方法：1.阈值检测：设定正常范围，超出即报警；2.趋势分析：对比历史数据，发现异常变化；3.模式识别：识别异常运行模式；4.关联分析：分析设备间关联关系。检测步骤：1.数据采集：实时采集能耗数据；2.数据预处理：清洗、去噪、归一化；3.特征提取：提取关键特征指标；4.异常识别：使用算法识别异常；5.异常分类：分类异常类型和级别；6.异常处理：生成处理建议。'
                    },
                    {
                        question: '能源管理系统有哪些功能？',
                        answer: '建筑能源智能管理系统主要功能包括：1.数据采集与监控：实时采集电、水、气等能耗数据；监控设备运行状态；7×24小时不间断监控。2.数据分析与统计：多维度数据分析；同比、环比分析；能耗趋势分析。3.能效评估与优化：COP能效计算；能效排名和对比；节能潜力分析。4.异常检测与告警：实时异常检测；多渠道告警通知；异常处理跟踪。5.报表管理：自定义报表生成；多格式导出；报表定时推送。6.设备管理：设备台账管理；维护保养记录；设备寿命分析。'
                    },
                    {
                        question: '如何提高设备运行效率？',
                        answer: '提高设备运行效率的方法：1.定期维护保养：制定维护保养计划；定期清洁、润滑、紧固；及时更换老化部件。2.优化运行参数：根据负荷调整运行参数；避免设备超负荷运行；避免设备空载运行。3.设备升级改造：更换高效节能设备；加装变频器等节能装置；优化控制系统。4.运行管理优化：合理安排设备运行时间；避免设备频繁启停；建立设备运行档案。5.人员培训：加强操作人员培训；规范操作流程；建立考核机制。'
                    },
                    {
                        question: '建筑节能有哪些措施？',
                        answer: '建筑节能措施可以从以下几个方面考虑：1.建筑围护结构节能：加强外墙保温；使用节能门窗；屋面保温隔热。2.空调系统节能：选用高效空调设备；优化空调运行策略；定期维护保养。3.照明系统节能：使用LED等节能光源；安装智能照明控制系统；充分利用自然光。4.电梯系统节能：选用节能电梯；优化电梯调度；安装能量回馈装置。5.给排水系统节能：使用节水器具；安装中水回用系统；优化供水压力。6.新能源利用：安装太阳能光伏系统；利用地源热泵；采用生物质能。'
                    },
                    {
                        question: '数据分析在能源管理中的应用？',
                        answer: '数据分析在能源管理中的应用：1.能耗分析：能耗构成分析；能耗趋势分析；能耗对比分析。2.能效分析：设备能效分析；系统能效分析；建筑能效分析。3.异常检测：能耗异常检测；设备异常检测；系统异常检测。4.预测分析：能耗预测；需求预测；故障预测。5.优化分析：运行参数优化；设备调度优化；系统配置优化。6.成本分析：能源成本分析；维护成本分析；投资回报分析。数据分析技术：统计分析、机器学习、深度学习、数据挖掘。'
                    },
                    {
                        question: '如何查看设备能耗数据？',
                        answer: '查看设备能耗数据可以通过以下方式：1.数据查询页面：可以按时间、设备类型、建筑等维度查询能耗数据；支持实时数据和历史数据查询；可以导出数据报表。2.统计分析页面：可以查看能耗趋势分析；可以进行同比环比分析；可以查看设备排名和对比。3.设备管理页面：可以查看单个设备的详细能耗数据；可以查看设备的运行状态和历史记录；可以进行设备能耗分析。'
                    },
                    {
                        question: '系统支持哪些报表导出？',
                        answer: '系统支持多种报表导出功能：1.能耗统计报表：按日、周、月、年统计能耗数据；支持按建筑、区域、设备类型分组；支持导出Excel、PDF格式。2.能效分析报表：COP能效分析报表；设备效率分析报表；节能潜力分析报表。3.异常检测报表：异常事件统计报表；异常处理记录报表；异常趋势分析报表。4.自定义报表：支持自定义报表模板；支持自定义查询条件；支持定时自动生成报表。所有报表都可以导出为Excel、PDF、Word等格式。'
                    }
                ]);
                
                const filteredFaqs = computed(() => {
                    if (!searchKeyword.value) return faqs.value;
                    const keyword = searchKeyword.value.toLowerCase();
                    return faqs.value.filter(faq => 
                        faq.question.toLowerCase().includes(keyword) || 
                        faq.answer.toLowerCase().includes(keyword)
                    );
                });
                
                const expandSidebar = () => {
                    isSidebarExpanded.value = true;
                };
                
                const collapseSidebar = () => {
                    isSidebarExpanded.value = false;
                };
                
                const handleSearch = () => {
                    ElementPlus.ElMessage.success('搜索完成！');
                };
                
                return {
                    searchKeyword,
                    activeFaq,
                    faqs,
                    filteredFaqs,
                    isSidebarExpanded,
                    expandSidebar,
                    collapseSidebar,
                    handleSearch
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
    <style>
        .faq-list {
            margin-top: 20px;
        }
        .faq-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            color: #333;
        }
        .faq-title i {
            color: #0c4e37;
        }
        .faq-content {
            padding: 15px;
            line-height: 1.8;
            color: #666;
            background: #f8f9fa;
            border-radius: 4px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ddd;
        }
        .el-collapse-item__header {
            padding: 15px;
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .el-collapse-item__wrap {
            border: none;
        }
        .el-collapse-item__content {
            padding-bottom: 0;
        }
    </style>
</body>
</html>
